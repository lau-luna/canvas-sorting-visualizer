<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SORTING!!</title>
    <link
      rel="stylesheet"
      type="text/css"
      href="https://counting-stars.neocities.org/css/styles.css"
    />
  </head>
  <body>
    <style>
      @font-face {
        font-family: NunitoLocal;
        src: url("./fonts/CyberpunkWaifus (1).ttf");
      }
      @font-face {
        font-family: SansLocal;
        src: url("./fonts/Pokemon Classic.ttf");
      }
      body {
        background-image: none;
        font-family: NunitoLocal;
      }
      button,
      select,
      label {
        font-family: SansLocal;
        font-size: 10px;
        color: var(--link-color);
      }
      button,
      select {
        border: 1px solid var(--border-color);
        box-shadow: 0 4px 8px var(--shadow-color);
        background-color: var(--background-color);
        padding: 6px 20px;
        overflow: visible;
        cursor: pointer;
        transition:
          letter-spacing 0.3s ease-in-out,
          padding 0.3s ease-in-out;
      }
      button:hover,
      select:hover {
        letter-spacing: 2px;
        color: var(--hover-color);
        cursor: pointer;
      }
      label {
        color: var(--text-color);
      }
      select {
        margin-left: 1%;
        min-width: 300px;
      }
      input[type="range"] {
        -webkit-appearance: none;
        height: 4px;
        background: var(--hover-color);
        border-radius: 2px;
        cursor: pointer;
      }
      input[type="range"]::-webkit-slider-runnable-track {
        height: 4px;
        background: var(--hover-color);
        border-radius: 2px;
        cursor: pointer;
      }
      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: var(--link-color);
        cursor: pointer;
      }
    </style>
    <div id="sorting">
      <canvas id="algo"></canvas>
    </div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
